name: 每日自動發文

on:
  schedule:
    - cron: "0 1 * * *"   # 台灣 09:00
    - cron: "0 7 * * *"   # 台灣 15:00
    - cron: "0 14 * * *"  # 台灣 22:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行發文
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          THREADS_USER_ID:       ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN:  ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_APP_ID:        ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET:    ${{ secrets.THREADS_APP_SECRET }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          IMGBB_KEY:             ${{ secrets.IMGBB_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python post.py

      - name: 提交 used_today.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add used_today.json
          git diff --staged --quiet || git commit -m "今日已自動更新發文記錄"
          git push