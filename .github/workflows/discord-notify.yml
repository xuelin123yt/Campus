name: Discord Commit Notification

on:
  push:
    branches:
      - main
      - master
      - develop
      # 添加你想要監控的分支

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 提取提交訊息（轉義特殊字元）
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | sed 's/"/\\"/g' | sed "s/'/\\'/g")
          COMMIT_MSG_FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
          
          # 基本資訊
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMMIT_HASH="${{ github.sha }}"
          COMMIT_SHORT=$(echo $COMMIT_HASH | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          
          # 計算檔案變更
          ADDED=$(git diff --numstat HEAD^ HEAD 2>/dev/null | awk '{s+=$1} END {print s+0}')
          DELETED=$(git diff --numstat HEAD^ HEAD 2>/dev/null | awk '{s+=$2} END {print s+0}')
          
          # 發送到 Discord
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "GitHub",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": "'"$REPO"'",
                "description": "**['"$COMMIT_SHORT"']('"$COMMIT_URL"')** '"$COMMIT_MSG_FIRST_LINE"'",
                "url": "'"$COMMIT_URL"'",
                "color": 5814783,
                "author": {
                  "name": "'"$AUTHOR"'",
                  "icon_url": "https://github.com/'"${{ github.event.head_commit.author.username }}"'.png"
                },
                "fields": [
                  {
                    "name": "分支",
                    "value": "'"$BRANCH"'",
                    "inline": true
                  },
                  {
                    "name": "變更",
                    "value": "+'"$ADDED"' -'"$DELETED"'",
                    "inline": true
                  }
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }'